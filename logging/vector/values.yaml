# Vector aggregator — Talos node log receiver.
#
# Single TCP listener for Talos's machine.logging.destinations push (service
# logs — kubelet, etcd, machined, apid, kernel events, etc.; Talos folds
# kernel logs into the same stream tagged with talos-service: kernel).
#
# Wire format is newline-delimited JSON over TCP (Talos's only option).
#
# LB-pinned to 10.0.11.105 from homelab-lb-pool so the tofu machine config
# has a stable target across re-applies. Same VLAN as the nodes — L2 ARP
# resolves without UDM static routes.
#
# Aggregator role => StatefulSet (chart default for this role).

role: Aggregator
replicas: 2

service:
  enabled: true
  type: LoadBalancer
  annotations:
    lbipam.cilium.io/ips: "10.0.11.105"
  ports:
    - name: talos-services
      port: 5514
      targetPort: 5514
      protocol: TCP
    - name: truenas-syslog
      port: 514
      targetPort: 5514
      protocol: UDP

customConfig:
  data_dir: /vector-data-dir
  api:
    enabled: true
    address: 0.0.0.0:8686
  sources:
    talos_services:
      type: socket
      mode: tcp
      address: 0.0.0.0:5514
      decoding:
        codec: json
      framing:
        method: newline_delimited
    truenas_syslog:
      type: syslog
      mode: udp
      address: 0.0.0.0:5514
  transforms:
    label_services:
      type: remap
      inputs: [talos_services]
      source: |
        .source = "talos-service"
        .service = del(."talos-service") || "unknown"
        .level   = del(."talos-level") || "info"
        # Talos tags each line with its hostname via machine.logging extraTags;
        # fall back to the socket peer (.host, a SNAT'd pod IP) until that lands.
        .node    = del(."talos-node") || .host
    label_truenas:
      type: remap
      inputs: [truenas_syslog]
      source: |
        .source = "truenas-syslog"
        .node   = .hostname
        .level  = .severity
  sinks:
    # Two Loki sinks so each carries only the labels its source populates:
    # `appname`/`facility` exist only on the TrueNAS syslog path, so applying
    # them to Talos events would fail every template render (log-flood warnings).
    #
    # The vector chart wraps customConfig in helm's `tpl` function, so any
    # `{{ ... }}` we put here is evaluated as a Go template at render time
    # and fails because the field names aren't helm functions. Escape with
    # raw-string backticks so helm emits literal `{{ field }}` for Vector
    # to interpolate at runtime.
    loki_talos:
      type: loki
      inputs: [label_services]
      endpoint: http://loki-gateway.monitoring.svc.cluster.local
      encoding:
        codec: json
      labels:
        source:  '{{ `{{ source }}` }}'
        service: '{{ `{{ service }}` }}'
        level:   '{{ `{{ level }}` }}'
        node:    '{{ `{{ node }}` }}'
    loki_truenas:
      type: loki
      inputs: [label_truenas]
      endpoint: http://loki-gateway.monitoring.svc.cluster.local
      encoding:
        codec: json
      labels:
        source:   '{{ `{{ source }}` }}'
        node:     '{{ `{{ node }}` }}'
        level:    '{{ `{{ level }}` }}'
        appname:  '{{ `{{ appname }}` }}'
        facility: '{{ `{{ facility }}` }}'
