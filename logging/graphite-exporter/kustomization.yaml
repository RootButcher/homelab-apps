apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - deployment.yaml
  - service.yaml
  - servicemonitor.yaml
configMapGenerator:
  - name: graphite-exporter-mapping
    files:
      - graphite_mapping.conf
generatorOptions:
  disableNameSuffixHash: false