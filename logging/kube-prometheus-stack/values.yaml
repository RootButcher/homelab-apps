
# Talos runs kube-proxy-less (Cilium replaces it; cluster.proxy.disabled: true),
# so there is no kube-proxy to scrape — disabling drops the false KubeProxyDown alert.
# CM/scheduler need no config here: their targets are auto-discovered at the CP node
# IPs and go green once Talos binds their metrics to 0.0.0.0 (machine config).
kubeProxy:
  enabled: false

prometheus:
  prometheusSpec:
    retention: 30d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    scrapeConfigSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-iscsi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: truenas-iscsi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

grafana:
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password
  # Grafana's default SQLite backend is single-writer. Two pods sharing
  # /var/lib/grafana/grafana.db corrupt each other's plugin-manager rows
  # (symptom: "No root app page component found" in the Logs Drilldown UI).
  # Pin replicas to 1 and forbid surge so a rollout never holds two pods on
  # the volume at once. The next stage of this — moving Grafana to an external
  # Postgres via `grafana.grafana.ini.database` — makes the pod fully
  # stateless: persistence goes away entirely (drop this whole block, set
  # `persistence.enabled: false`), not a storage-class swap.
  replicas: 1
  deploymentStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  persistence:
    enabled: true
    type: pvc
    storageClassName: truenas-iscsi
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki-gateway.monitoring.svc.cluster.local
      jsonData:
        maxLines: 1000
