# kube-prometheus-stack — Prometheus Operator + Prometheus + Alertmanager +
# Grafana + node-exporter + kube-state-metrics. Single Helm release.
#
# secrets/application.yaml is discovered independently by the tier-2 logging-apps
# stub (ArgoCD's directory glob crosses path separators, so the depth-2 file is
# picked up). No need for an explicit call-out from here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 86.2.2
      helm:
        valueFiles:
          - $values/logging/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      path: logging/kube-prometheus-stack
      directory:
        include: "ingressroute*.yaml"
  syncPolicy:
    # node-exporter is a DaemonSet that needs hostNetwork/hostPID/hostPath +
    # hostPort 9100. Talos cluster-default PodSecurity enforces `baseline`,
    # which forbids all of those. Label the namespace `privileged` so the
    # DaemonSet pods are admitted. Same fix as the rook-ceph Application.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true