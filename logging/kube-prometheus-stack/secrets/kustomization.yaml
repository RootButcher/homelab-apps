# Bootstrap-only Secret. Grafana reads admin-user / admin-password from the
# materialised Secret at first-time admin-user creation (initial empty SQLite).
# UI password changes thereafter live in /var/lib/grafana/grafana.db and do not
# drift back here; a PVC reset will silently revert to the SOPS value.
# See apps/README.md "Bootstrap-only values".
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generators:
  - ksops-generator.yaml