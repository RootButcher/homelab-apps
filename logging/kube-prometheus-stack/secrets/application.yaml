# kube-prometheus-stack-secrets — Grafana admin credentials, pre-created so the
# chart's `grafana.admin.existingSecret` skips its randAlphaNum generator (the
# generator's non-deterministic output was the source of a chart-managed drift
# loop that rolled the Grafana pod every reconcile).
#
# Materialized by the parent kube-prometheus-stack application.yaml via an
# explicit `path: logging/kube-prometheus-stack/secrets, include: application.yaml`
# source (Phase 3 Shape A explicit call-out).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: logging/kube-prometheus-stack/secrets
    plugin:
      name: kustomize-sops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true