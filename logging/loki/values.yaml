# Loki — single-binary mode. Homelab scale; distributed mode is for >1TB/day.
# Object storage (S3-compatible) is the long-term backend; until we stand up
# Rook-Ceph RGW or point at TrueNAS MinIO, filesystem PVC on rook-ceph-block
# is fine.

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  limits_config:
    retention_period: 720h
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    volume_enabled: true
    # Covers the grafana-lokiexplore-app Drilldown UI's ~60d lookback on
    # /detected_labels and /detected_fields. Default 30d1h trips a 400 storm.
    max_query_length: 1500h
  # Pattern ingester powers Grafana Logs Drilldown's /loki/api/v1/patterns
  # endpoint. Off by default in SingleBinary; in-memory only, 3h retention.
  pattern_ingester:
    enabled: true
  compactor:
    working_directory: /var/loki/compactor
    delete_request_store: filesystem
    retention_enabled: true
    retention_delete_delay: 2h

# Override the chart's broken hostname-based resolver default — workaround for grafana/loki#14013.
gateway:
  nginxConfig:
    resolver: "10.96.0.10 valid=15s"

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    storageClass: rook-ceph-block
    accessModes: ["ReadWriteOnce"]
    size: 50Gi

# Disable the components that exist only for distributed mode so the chart
# doesn't render their (now-redundant) PVCs / Deployments.
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Disable the bundled test / canary / chunks-cache / results-cache; Grafana
# is the UI and we don't need cache pods at this scale.
chunksCache:
  enabled: false
resultsCache:
  enabled: false
test:
  enabled: false
lokiCanary:
  enabled: false

# Loki mixin: dashboards (read/write/operational), recording rules, alerts.
# Picked up by the kube-prometheus-stack grafana sidecar.
monitoring:
  dashboards:
    enabled: true
    labels:
      grafana_dashboard: "1"
  rules:
    enabled: true
    alerting: true
