# Tier 2 — logging stack master. One Application per app.
#
# Patterns mirror apps/infra/app-of-apps.yaml:
#   - helm chart with co-located IngressRoute → three sources (chart,
#     ref:values, raw 'ingressroute*.yaml' directory).
#   - helm chart, values only → two sources (chart + ref:values).
#
# Storage: PVCs use `rook-ceph-block` from the infra stack's rook-ceph-cluster.
# The infra stack's Tier-1 Application is reconciled before this one (file
# ordering in apps/app-of-apps.yaml), so by the time these apps come up
# rook-ceph block has its StorageClass registered.
#
# Out of scope for this pass (called out so they aren't forgotten):
#   - Talos machine.logging.destinations edit (lives in tofu/), pointed at
#     the Alloy Service. Done after Alloy's Service DNS exists.
#   - Loki object-storage backend; filesystem PVC is the v1.
#   - Pod-log DaemonSet; Talos node logs first via Alloy receiver.
#   - SOPS-encrypted Grafana admin secret; first install uses the
#     chart-generated password.
---
# kube-prometheus-stack — Prometheus Operator + Prometheus + Alertmanager +
# Grafana + node-exporter + kube-state-metrics. Single Helm release.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 86.2.2
      helm:
        valueFiles:
          - $values/logging/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      path: logging/kube-prometheus-stack
      directory:
        include: "ingressroute*.yaml"
  syncPolicy:
    # node-exporter is a DaemonSet that needs hostNetwork/hostPID/hostPath +
    # hostPort 9100. Talos cluster-default PodSecurity enforces `baseline`,
    # which forbids all of those. Label the namespace `privileged` so the
    # DaemonSet pods are admitted. Same fix as the rook-ceph Application.
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
        pod-security.kubernetes.io/warn: privileged
        pod-security.kubernetes.io/audit: privileged
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
---
# prometheus-pushgateway — endpoint the homelab-ci fio CLI pushes to with
# `--gateway`. ServiceMonitor wires it back into the kube-prometheus-stack
# Prometheus, so metrics flow: CLI → Pushgateway → Prometheus → Grafana.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-pushgateway
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - chart: prometheus-pushgateway
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 3.6.1
      helm:
        valueFiles:
          - $values/logging/prometheus-pushgateway/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      path: logging/prometheus-pushgateway
      directory:
        include: "ingressroute*.yaml"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
---
# Loki — single-binary mode, filesystem storage on rook-ceph-block.
# Grafana datasource is registered via kube-prometheus-stack values.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - chart: loki
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 6.55.0
      helm:
        valueFiles:
          - $values/logging/loki/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
---
# Alloy — log receiver for Talos's machine.logging.destinations push.
# Deployment (not DaemonSet); two pods behind a ClusterIP Service so Talos
# nodes have a stable target. Forwards to Loki.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  sources:
    - chart: alloy
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.10.0
      helm:
        valueFiles:
          - $values/logging/alloy/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
