# Tier 2 — logging stack.
#
# Two YAML documents:
#   1. AppProject `logging` — UI grouping + project boundary for every logging app.
#   2. Application `logging-apps` — discovery stub that materializes every
#      depth-1 application.yaml in this stack. Recursion limit is exactly one:
#      sub-apps nested deeper (e.g. kube-prometheus-stack/secrets/application.yaml)
#      must be explicitly called out by their depth-1 parent — see the parent's
#      application.yaml sources.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: logging
  namespace: argocd
spec:
  description: logging stack
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: logging
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: logging
    directory:
      recurse: true
      include: "{*/application.yaml,*/application-secrets.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true