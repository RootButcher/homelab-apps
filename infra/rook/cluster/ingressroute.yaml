apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: rook-ceph-dashboard
  namespace: rook-ceph
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ceph.local.rootbutcher.dev`)
      kind: Rule
      services:
        - name: rook-ceph-mgr-dashboard
          port: 7000
  tls: {}
