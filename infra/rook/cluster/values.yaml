operatorNamespace: rook-ceph

toolbox:
  enabled: true

monitoring:
  enabled: true
  createPrometheusRules: true

cephClusterSpec:
  cephVersion:
    image: quay.io/ceph/ceph:v20.2.1  # bump from v18.2.4 TODO updater
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    modules:
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    ssl: false
  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
  storage:
    useAllNodes: true
    useAllDevices: false
    deviceFilter: "^sdb$"
    config:
      osdsPerDevice: "1"

  # Tight resource caps so daemons fit on the 4 GiB Talos nodes. Rook 1.20
  # defaults (osd 4Gi request) overflow these nodes; values below mirror what
  # a small dev cluster typically uses.
  resources:
    osd:
      requests:
        cpu: "250m"
        memory: "1Gi"
      limits:
        memory: "2Gi"
    mon:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"
    mgr:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"
    crashcollector:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        memory: "128Mi"
    exporter:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        memory: "128Mi"
    prepareosd:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"

cephBlockPools:
  - name: replicapool
    spec:
      failureDomain: host
      replicated:
        size: 3
    storageClass:
      enabled: true
      name: rook-ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: Immediate
      parameters:
        imageFormat: "2"
        imageFeatures: layering
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/fstype: ext4

cephFileSystems:
  - name: ceph-filesystem
    spec:
      metadataPool:
        replicated:
          size: 3
      dataPools:
        - name: data0
          failureDomain: host
          replicated:
            size: 3
      metadataServer:
        activeCount: 1
        activeStandby: true
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            memory: "1Gi"
    storageClass:
      enabled: true
      name: rook-cephfs
      isDefault: false
      pool: data0
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: Immediate
      parameters:
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: "{{ .Release.Namespace }}"
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
        csi.storage.k8s.io/node-stage-secret-namespace: "{{ .Release.Namespace }}"

cephObjectStores: []