# Talos fix for the node plugin's iscsiadm — see the truenas-csi-iscsiadm-wrapper ConfigMap
# for the full rationale. We mount that shim and copy it over /usr/sbin/iscsiadm in postStart,
# replacing upstream's nsenter-into-PID1 wrapper (which returns exit 127 on Talos).
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: truenas-csi-node
  namespace: truenas-csi
spec:
  template:
    spec:
      containers:
        - name: csi-node
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - cp /iscsiadm-shim/iscsiadm /usr/sbin/iscsiadm && chmod 0755 /usr/sbin/iscsiadm && mkdir -p /run/lock/iscsi
          volumeMounts:
            - name: iscsiadm-shim
              mountPath: /iscsiadm-shim
      volumes:
        - name: iscsiadm-shim
          configMap:
            name: truenas-csi-iscsiadm-wrapper
            defaultMode: 0755
