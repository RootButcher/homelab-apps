# TrueNAS API key (SOPS) — the WebSocket JSON-RPC credential the truenas-csi driver
# authenticates with. Synced one wave before the driver so the Secret exists first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: truenas-csi-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: truenas-csi
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: infra/truenas-csi/secrets
    plugin:
      name: kustomize-sops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
