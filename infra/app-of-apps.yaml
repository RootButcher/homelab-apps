# Tier 2 — infra stack master. One Application per app.
# Helm pattern: chart + ref:values for valueFiles, plus a 3rd repo source
#               pulling raw IngressRoute(s) co-located with the values file.
# Raw pattern:  single `source:` with `path: infra/<app>` pointing at manifests.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  sources:
    - chart: cilium
      repoURL: https://helm.cilium.io/
      targetRevision: 1.16.5
      helm:
        valueFiles:
          - $values/infra/cilium/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      path: infra/cilium
      directory:
        include: "ingressroute*.yaml"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
---
# Cilium LB IPAM config — raw type. CiliumLoadBalancerIPPool +
# CiliumL2AnnouncementPolicy live here so they can be edited without
# touching the cilium helm release directly.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-lb-ipam
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: infra/cilium-lb-ipam
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - CreateNamespace=true
---
# ArgoCD-related extras (today: just the IngressRoute). ArgoCD itself is still
# tofu-managed; this Application only manages resources we add in apps/infra/argocd/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: infra/argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  sources:
    - chart: traefik
      repoURL: https://traefik.github.io/charts
      targetRevision: 32.0.0
      helm:
        valueFiles:
          - $values/infra/traefik/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      path: infra/traefik
      directory:
        include: "ingressroute*.yaml"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
