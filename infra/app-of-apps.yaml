# Tier 2 — infra stack.
#
# Documents:
#   1. AppProject `infra` — UI grouping + project boundary for every infra app.
#   2. Application `infra-apps` — discovery stub that materializes every
#      per-app application.yaml in this stack (ArgoCD's directory glob crosses
#      path separators so both depth-1 and depth-2 files are picked up).
#
# Every infra app — including the foundational ones (`cilium` at
# cilium/chart/application.yaml, `cilium-lb-ipam` at cilium/lb-ipam/application.yaml,
# `argocd` at argocd/application.yaml) — is now discovered by infra-apps. The
# cilium/argocd Application manifests deliberately omit the resources-finalizer so
# removing them never cascade-deletes the CNI or ArgoCD itself.
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: infra stack
  sourceRepos:
    - '*'
  destinations:
    - server: '*'
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-apps
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/RootButcher/homelab-apps
    targetRevision: HEAD
    path: infra
    directory:
      recurse: true
      include: "{*/application.yaml,*/application-secrets.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true