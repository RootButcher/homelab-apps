# Tier 2 — infra stack master. One Application per app.
# Helm pattern: two sources — upstream chart + this repo with `ref: values`
#               so the chart's valueFiles reads $values/infra/<app>/values.yaml.
# Raw pattern:  single `source:` with `path: infra/<app>` pointing at manifests in this repo.
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  sources:
    - chart: cilium
      repoURL: https://helm.cilium.io/
      targetRevision: 1.16.5
      helm:
        valueFiles:
          - $values/infra/cilium/values.yaml
    - repoURL: https://github.com/RootButcher/homelab-apps
      targetRevision: HEAD
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=true