apiVersion: ceph.rook.io/v1
kind: CephCluster
metadata:
  name: rook-ceph
  namespace: rook-ceph
spec:
  cephVersion:
    image: quay.io/ceph/ceph:v20.2.1  # bump from v18.2.4 TODO updater
  dataDirHostPath: /var/lib/rook
  mon:
    count: 3
    allowMultiplePerNode: false
  mgr:
    count: 2
    modules:
      - name: rook
        enabled: true
  dashboard:
    enabled: true
    ssl: false
  # Allow every Ceph daemon (mon, mgr, osd, mds, rgw, crashcollector) to land
  # on control-plane nodes as well as workers.
  placement:
    all:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
  storage:
    useAllNodes: true
    useAllDevices: false
    deviceFilter: "^sdb$"
    config:
      osdsPerDevice: "1"
