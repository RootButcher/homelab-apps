# Grafana dashboards for Traefik.
# Pinned upstream: https://github.com/traefik/traefik/tree/v3.7.5/contrib/grafana
# Refresh: re-download both JSON files at a newer tag and bump the pin above.
# TODO updater
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: traefik-dashboards
    files:
      - traefik.json
      - traefik-kubernetes.json
    options:
      # disableNameSuffixHash keeps the CM name stable so the grafana sidecar
      # treats edits as updates, not (delete + create) of a new dashboard.
      disableNameSuffixHash: true
      labels:
        grafana_dashboard: "1"
