kubeProxyReplacement: true
k8sServiceHost: localhost
k8sServicePort: 7445

ipam:
  mode: kubernetes

# Talos provides cgroupv2 — do not let Cilium remount it
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Talos blocks SYS_MODULE; must specify explicit capability sets
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

operator:
  replicas: 1
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
  dashboards:
    enabled: true
    label: grafana_dashboard
    labelValue: "1"

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true

# Cilium agent dashboard ConfigMap, picked up by the kube-prometheus-stack
# grafana sidecar (LABEL=grafana_dashboard, NAMESPACE=ALL).
dashboards:
  enabled: true
  label: grafana_dashboard
  labelValue: "1"

# L2 announcements + LB IPAM (lbIPAM is enabled by default in 1.16)
l2announcements:
  enabled: true

# Recommended bumps when l2announcements is enabled — agents create/refresh leases
# frequently, default client rate limits can throttle them.
k8sClientRateLimit:
  qps: 50
  burst: 100

hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true
    service:
      type: ClusterIP
  metrics:
    enabled:
      - dns
      - drop
      - tcp
      - flow
      - icmp
      - http
    serviceMonitor:
      enabled: true
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"