apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.cilium.io/
    chart: cilium
    targetRevision: 1.16.5
    helm:
      values: |
        kubeProxyReplacement: true
        k8sServiceHost: 10.0.11.200
        k8sServicePort: 6443
        ipam:
          mode: kubernetes
        operator:
          replicas: 1
        hubble: # should this be seperate so a hubble ui update doesnt touch core cilium
          enabled: true
          relay:
            enabled: true
          ui:
            enabled: true
            service:
              type: NodePort
              nodePort: 30090
  destination:
    server: https://kubernetes.default.svc #todo explain this
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true