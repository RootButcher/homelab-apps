# Off-VLAN reachability note: LB IPs from this pool are announced via Cilium L2,
# which only responds to ARP from inside the cluster VLAN (10.0.11.0/24). For
# hosts on other subnets (e.g. the LAN at 10.0.0.0/24), the UDM needs a static
# route covering this pool with a cluster node IP as next-hop, e.g.:
#   10.0.11.96/27   -> 10.0.11.201    (covers .96-.127, includes .100)
#   10.0.11.128/27  -> 10.0.11.201    (covers .128-.159, add if you grow past .127)
# This is a workaround until BGP peering with the UDM is in place (roadmap #4).
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-lb-pool
spec:
  blocks:
    - start: "10.0.11.100"
      stop: "10.0.11.150"
