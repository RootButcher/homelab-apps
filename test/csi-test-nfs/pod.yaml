---
apiVersion: v1
kind: Pod
metadata:
  name: csi-test-nfs
  namespace: test
  labels:
    app: csi-test-nfs
spec:
  restartPolicy: Always
  containers:
    - name: writer
      image: busybox:1.37
      command:
        - sh
        - -c
        - 'date >> /data/log; tail -f /data/log'
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: csi-test-nfs